<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Top-down schematic of a canal boat surrounded by LiDAR scan rings, a camera frustum cone, and three perception bounding boxes labeling a kayak, a buoy, and a distant vessel.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="85%">
      <stop offset="0%" stop-color="#1a1445"/>
      <stop offset="55%" stop-color="#0e2248"/>
      <stop offset="100%" stop-color="#0c0c1d"/>
    </radialGradient>
    <linearGradient id="canalEdge" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Canal banks -->
  <rect x="0" y="0" width="92" height="630" fill="url(#canalEdge)"/>
  <rect x="1108" y="0" width="92" height="630" fill="url(#canalEdge)"/>

  <!-- Coordinate grid (faint) -->
  <g stroke="#3b82f6" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- LiDAR scan rings (centered on the boat) -->
  <g transform="translate(600, 360)" fill="none" stroke="#3b82f6">
    <circle r="90"  stroke-opacity="0.75" stroke-width="0.6"/>
    <circle r="160" stroke-opacity="0.55" stroke-width="0.6"/>
    <circle r="240" stroke-opacity="0.38" stroke-width="0.6"/>
    <circle r="330" stroke-opacity="0.24" stroke-width="0.6"/>
    <circle r="430" stroke-opacity="0.14" stroke-width="0.6"/>
  </g>

  <!-- Camera frustum (forward cone) -->
  <path d="M 600 360 L 370 60 L 830 60 Z" fill="#3b82f6" fill-opacity="0.06"/>
  <path d="M 600 360 L 370 60 L 830 60 Z" fill="none" stroke="#3b82f6" stroke-width="0.7" stroke-dasharray="6 7" stroke-opacity="0.45"/>

  <!-- Wake trail (subtle, behind boat) -->
  <g stroke="#3b82f6" fill="none" stroke-width="1" opacity="0.25">
    <path d="M 565 430 Q 555 510 525 620"/>
    <path d="M 635 430 Q 645 510 675 620"/>
  </g>

  <!-- Boat (top-down silhouette) -->
  <g transform="translate(600, 360)">
    <path d="M -38 -72 Q -38 -100 0 -106 Q 38 -100 38 -72 L 38 68 L -38 68 Z" fill="#e5e5e5" fill-opacity="0.92"/>
    <rect x="-24" y="-50" width="48" height="62" fill="#0c0c1d" fill-opacity="0.65"/>
    <circle cx="0" cy="-30" r="6" fill="#3b82f6"/>
    <rect x="-2.5" y="-44" width="5" height="14" fill="#3b82f6"/>
  </g>

  <!-- Detection: kayak (left, foreground) -->
  <g transform="translate(420, 230)" fill="none" stroke="#60a5fa" stroke-width="1.6">
    <rect x="-30" y="-14" width="60" height="28"/>
    <line x1="-30" y1="-14" x2="-25" y2="-14" stroke-width="2.2"/>
    <line x1="-30" y1="-14" x2="-30" y2="-9" stroke-width="2.2"/>
    <line x1="30" y1="14" x2="25" y2="14" stroke-width="2.2"/>
    <line x1="30" y1="14" x2="30" y2="9" stroke-width="2.2"/>
  </g>
  <text x="390" y="208" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#93c5fd" letter-spacing="0.06em">kayak  0.91</text>

  <!-- Detection: buoy (right, mid) -->
  <g transform="translate(800, 310)" fill="none" stroke="#60a5fa" stroke-width="1.6">
    <rect x="-14" y="-14" width="28" height="28"/>
    <line x1="-14" y1="-14" x2="-9" y2="-14" stroke-width="2.2"/>
    <line x1="-14" y1="-14" x2="-14" y2="-9" stroke-width="2.2"/>
    <line x1="14" y1="14" x2="9" y2="14" stroke-width="2.2"/>
    <line x1="14" y1="14" x2="14" y2="9" stroke-width="2.2"/>
  </g>
  <text x="786" y="288" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#93c5fd" letter-spacing="0.06em">buoy  0.88</text>

  <!-- Detection: vessel (far, ahead) — flagged in amber to draw the eye -->
  <g transform="translate(680, 110)" fill="none" stroke="#fbbf24" stroke-width="1.6">
    <rect x="-42" y="-22" width="84" height="44"/>
    <line x1="-42" y1="-22" x2="-36" y2="-22" stroke-width="2.4"/>
    <line x1="-42" y1="-22" x2="-42" y2="-16" stroke-width="2.4"/>
    <line x1="42" y1="22" x2="36" y2="22" stroke-width="2.4"/>
    <line x1="42" y1="22" x2="42" y2="16" stroke-width="2.4"/>
  </g>
  <text x="638" y="80" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#fcd34d" letter-spacing="0.06em">vessel  0.76</text>

  <!-- Ground-truth ticks on the boat axis -->
  <g stroke="#3b82f6" stroke-width="0.6" opacity="0.5">
    <line x1="600" y1="20" x2="600" y2="40"/>
    <line x1="600" y1="590" x2="600" y2="610"/>
  </g>

  <!-- Instrument captions -->
  <text x="44" y="582" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#a1a1a1" letter-spacing="0.22em">PERCEPTION · DETECTION + TRACKING</text>
  <text x="1156" y="582" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#a1a1a1" letter-spacing="0.22em" text-anchor="end">CAMERA · LIDAR FUSION</text>
  <text x="600" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#3b82f6" letter-spacing="0.28em" text-anchor="middle" opacity="0.75">FRAME 0142  ·  T+30MS</text>
</svg>
