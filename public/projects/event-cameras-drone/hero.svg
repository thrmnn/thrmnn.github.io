<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Top-down schematic of a quadrotor drone mid-maneuver, its stereo event-camera cones, sparse red and blue event-polarity pixels, an IMU axis indicator, motion vector, and labeled bounding boxes for tracked features.">
  <defs>
    <radialGradient id="droneBg" cx="50%" cy="55%" r="85%">
      <stop offset="0%" stop-color="#1a1445"/>
      <stop offset="55%" stop-color="#0e2248"/>
      <stop offset="100%" stop-color="#0c0c1d"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#droneBg)"/>

  <!-- Coordinate grid (faint) -->
  <g stroke="#3b82f6" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Sparse event-polarity pixels (deterministic positions, no RNG to keep the SVG inspectable) -->
  <g shape-rendering="crispEdges">
    <!-- Positive polarity (red) — leading edge of motion -->
    <g fill="#f87171">
      <rect x="710" y="220" width="3" height="3"/>
      <rect x="724" y="232" width="3" height="3"/>
      <rect x="690" y="252" width="3" height="3"/>
      <rect x="740" y="266" width="3" height="3"/>
      <rect x="760" y="280" width="3" height="3"/>
      <rect x="708" y="296" width="3" height="3"/>
      <rect x="780" y="314" width="3" height="3"/>
      <rect x="746" y="332" width="3" height="3"/>
      <rect x="800" y="356" width="3" height="3"/>
      <rect x="724" y="388" width="3" height="3"/>
      <rect x="772" y="408" width="3" height="3"/>
      <rect x="700" y="430" width="3" height="3"/>
      <rect x="826" y="244" width="3" height="3"/>
      <rect x="850" y="298" width="3" height="3"/>
      <rect x="870" y="364" width="3" height="3"/>
      <rect x="892" y="412" width="3" height="3"/>
      <rect x="666" y="368" width="3" height="3"/>
      <rect x="650" y="320" width="3" height="3"/>
      <rect x="620" y="276" width="3" height="3"/>
      <rect x="598" y="350" width="3" height="3"/>
    </g>
    <!-- Negative polarity (blue) — trailing edge -->
    <g fill="#60a5fa">
      <rect x="420" y="240" width="3" height="3"/>
      <rect x="436" y="262" width="3" height="3"/>
      <rect x="404" y="284" width="3" height="3"/>
      <rect x="452" y="306" width="3" height="3"/>
      <rect x="386" y="326" width="3" height="3"/>
      <rect x="468" y="346" width="3" height="3"/>
      <rect x="412" y="372" width="3" height="3"/>
      <rect x="444" y="394" width="3" height="3"/>
      <rect x="376" y="410" width="3" height="3"/>
      <rect x="354" y="358" width="3" height="3"/>
      <rect x="334" y="306" width="3" height="3"/>
      <rect x="314" y="380" width="3" height="3"/>
      <rect x="298" y="284" width="3" height="3"/>
      <rect x="280" y="356" width="3" height="3"/>
      <rect x="260" y="312" width="3" height="3"/>
      <rect x="252" y="402" width="3" height="3"/>
      <rect x="488" y="218" width="3" height="3"/>
      <rect x="512" y="252" width="3" height="3"/>
      <rect x="476" y="430" width="3" height="3"/>
      <rect x="510" y="446" width="3" height="3"/>
    </g>
  </g>

  <!-- Stereo event-camera FOV cones (two, forward, slightly offset) -->
  <path d="M 580 320 L 350 80 L 660 80 Z" fill="#3b82f6" fill-opacity="0.05"/>
  <path d="M 580 320 L 350 80 L 660 80 Z" fill="none" stroke="#3b82f6" stroke-width="0.7" stroke-dasharray="6 7" stroke-opacity="0.45"/>
  <path d="M 620 320 L 540 80 L 850 80 Z" fill="#3b82f6" fill-opacity="0.05"/>
  <path d="M 620 320 L 540 80 L 850 80 Z" fill="none" stroke="#3b82f6" stroke-width="0.7" stroke-dasharray="6 7" stroke-opacity="0.45"/>

  <!-- Motion vector — long arrow showing aggressive maneuver -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.85">
    <line x1="600" y1="330" x2="930" y2="180" stroke-dasharray="2 3"/>
    <polyline points="918,170 940,178 924,196" stroke-linejoin="round"/>
  </g>
  <text x="932" y="208" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#fcd34d" letter-spacing="0.08em">v &gt; 5g</text>

  <!-- Quadrotor (top-down X-shape) -->
  <g transform="translate(600, 320)">
    <!-- Arms -->
    <line x1="-58" y1="-58" x2="58" y2="58" stroke="#e5e5e5" stroke-width="6" stroke-linecap="round" stroke-opacity="0.92"/>
    <line x1="-58" y1="58" x2="58" y2="-58" stroke="#e5e5e5" stroke-width="6" stroke-linecap="round" stroke-opacity="0.92"/>
    <!-- Hub -->
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#0c0c1d" stroke="#e5e5e5" stroke-width="1.5" stroke-opacity="0.9"/>
    <!-- Forward indicator -->
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="-22" r="3" fill="#3b82f6"/>
    <!-- Rotor discs (motion-blurred ring style) -->
    <g fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.55">
      <circle cx="-58" cy="-58" r="22"/>
      <circle cx="58" cy="-58" r="22"/>
      <circle cx="-58" cy="58" r="22"/>
      <circle cx="58" cy="58" r="22"/>
    </g>
    <g fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.3">
      <circle cx="-58" cy="-58" r="28"/>
      <circle cx="58" cy="-58" r="28"/>
      <circle cx="-58" cy="58" r="28"/>
      <circle cx="58" cy="58" r="28"/>
    </g>
  </g>

  <!-- IMU axis indicator (small inset, bottom-right of drone) -->
  <g transform="translate(740, 430)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#f87171" stroke-width="1.5"/>
    <text x="26" y="4" fill="#fca5a5">x</text>
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#86efac" stroke-width="1.5"/>
    <text x="-4" y="-26" fill="#86efac">y</text>
    <line x1="0" y1="0" x2="-15" y2="15" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="-30" y="22" fill="#93c5fd">z</text>
    <text x="-16" y="44" fill="#a1a1a1" letter-spacing="0.16em">IMU</text>
  </g>

  <!-- Tracked feature bounding box: feature point (cluster of events) -->
  <g transform="translate(770, 290)" fill="none" stroke="#60a5fa" stroke-width="1.6">
    <rect x="-18" y="-18" width="36" height="36"/>
    <line x1="-18" y1="-18" x2="-12" y2="-18" stroke-width="2.2"/>
    <line x1="-18" y1="-18" x2="-18" y2="-12" stroke-width="2.2"/>
    <line x1="18" y1="18" x2="12" y2="18" stroke-width="2.2"/>
    <line x1="18" y1="18" x2="18" y2="12" stroke-width="2.2"/>
  </g>
  <text x="752" y="268" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#93c5fd" letter-spacing="0.06em">feat  0.94</text>

  <!-- Tracked feature bounding box: obstacle ahead -->
  <g transform="translate(720, 130)" fill="none" stroke="#fbbf24" stroke-width="1.6">
    <rect x="-30" y="-18" width="60" height="36"/>
    <line x1="-30" y1="-18" x2="-22" y2="-18" stroke-width="2.4"/>
    <line x1="-30" y1="-18" x2="-30" y2="-10" stroke-width="2.4"/>
    <line x1="30" y1="18" x2="22" y2="18" stroke-width="2.4"/>
    <line x1="30" y1="18" x2="30" y2="10" stroke-width="2.4"/>
  </g>
  <text x="690" y="104" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#fcd34d" letter-spacing="0.06em">obstacle  0.82</text>

  <!-- Instrument captions -->
  <text x="44" y="582" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#a1a1a1" letter-spacing="0.22em">EVIO · EVENT VIO + IMU · 6-DOF</text>
  <text x="1156" y="582" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#a1a1a1" letter-spacing="0.22em" text-anchor="end">REGIME: &gt; 5G FLIGHT</text>
  <text x="600" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#3b82f6" letter-spacing="0.28em" text-anchor="middle" opacity="0.75">FRAME 0042  ·  ΔT 4MS</text>
</svg>
